<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Calendar - Christian Conservative Today</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .event-card { cursor: pointer; transition: transform 0.2s; }
        .event-card:hover { transform: translateY(-5px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .event-date { font-size: 1.2rem; font-weight: bold; color: #0d6efd; }
        .event-category { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; }
        .category-service { background: #d1ecf1; color: #0c5460; }
        .category-conference { background: #f8d7da; color: #721c24; }
        .category-outreach { background: #d4edda; color: #155724; }
        .category-prayer { background: #fff3cd; color: #856404; }
        .category-general { background: #e2e3e5; color: #383d41; }
        @media (min-width: 1200px) {.container {max-width: 1160px !important;}
}
    </style>
</head>
<body>
    <div id="navbar-container" data-page="events-calendar"></div>

    <div class="container my-5" style="margin-top: 5rem !important;">
        <h1 class="mb-4">📅 Events Calendar</h1>

        <div class="row mb-4">
            <div class="col-md-3">
                <select id="categoryFilter" class="form-select">
                    <option value="">All Categories</option>
                    <option value="service">Church Service</option>
                    <option value="conference">Conference</option>
                    <option value="outreach">Outreach</option>
                    <option value="prayer">Prayer Meeting</option>
                    <option value="general">General</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="stateFilter" class="form-select">
                    <option value="">All States</option>
                </select>
            </div>
        </div>

        <div id="eventsContainer" class="row"></div>
    </div>

    <!-- Event Modal -->
    <div class="modal fade" id="eventModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="eventTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="eventImage"></div>
                    <p class="event-date" id="eventDate"></p>
                    <p id="eventLocation"></p>
                    <p id="eventDescription"></p>
                    <div id="eventContact"></div>
                    <div id="eventRegistration"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="navbar.js"></script>
    <script>
        const API_URL = 'https://gu6c08ctel.execute-api.us-east-1.amazonaws.com/prod/events';

        fetch('navbar.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;
                initNavbar();
            });

        const states = ['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'];
        states.forEach(state => {
            $('#stateFilter').append(`<option value="${state}">${state}</option>`);
        });

        function loadEvents() {
            const category = $('#categoryFilter').val();
            const state = $('#stateFilter').val();
            let url = API_URL + '?action=list';
            if (category) url += '&category=' + category;
            if (state) url += '&state=' + state;

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const container = $('#eventsContainer');
                    container.empty();
                    
                    if (!data.events || data.events.length === 0) {
                        container.html('<div class="col-12"><p class="text-center">No events found.</p></div>');
                        return;
                    }

                    data.events.forEach(event => {
                        console.log('Event date raw:', event.event_date);
                        let dateStr;
                        try {
                            // Handle YYYY-MM-DD format
                            const parts = event.event_date.split('-');
                            if (parts.length === 3) {
                                const eventDate = new Date(parts[0], parts[1] - 1, parts[2]);
                                dateStr = eventDate.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
                            } else {
                                dateStr = event.event_date;
                            }
                        } catch (e) {
                            dateStr = event.event_date;
                        }
                        
                        container.append(`
                            <div class="col-md-4 mb-4">
                                <div class="card event-card h-100" onclick="showEvent('${event.event_id}')">
                                    ${event.image_url ? `<img src="${event.image_url}" class="card-img-top" alt="${event.title}">` : ''}
                                    <div class="card-body">
                                        <span class="event-category category-${event.category}">${event.category}</span>
                                        <h5 class="card-title mt-2">${event.title}</h5>
                                        <p class="event-date">${dateStr} ${event.event_time || ''}</p>
                                        <p class="card-text">${event.location || ''}</p>
                                    </div>
                                </div>
                            </div>
                        `);
                    });
                });
        }

        function showEvent(eventId) {
            fetch(API_URL + '?action=get&event_id=' + eventId)
                .then(r => r.json())
                .then(data => {
                    const event = data.event;
                    let dateStr;
                    try {
                        const parts = event.event_date.split('-');
                        if (parts.length === 3) {
                            const eventDate = new Date(parts[0], parts[1] - 1, parts[2]);
                            dateStr = eventDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                        } else {
                            dateStr = event.event_date;
                        }
                    } catch (e) {
                        dateStr = event.event_date;
                    }

                    $('#eventTitle').text(event.title);
                    $('#eventDate').text(dateStr + (event.event_time ? ' at ' + event.event_time : ''));
                    $('#eventLocation').html(event.location ? `<strong>Location:</strong> ${event.location}<br>${event.address || ''}` : '');
                    $('#eventDescription').html(event.description);
                    $('#eventImage').html(event.image_url ? `<img src="${event.image_url}" class="img-fluid mb-3" alt="${event.title}">` : '');
                    
                    let contact = '';
                    if (event.contact_email) contact += `<p><strong>Contact:</strong> ${event.contact_email}</p>`;
                    if (event.contact_phone) contact += `<p><strong>Phone:</strong> ${event.contact_phone}</p>`;
                    $('#eventContact').html(contact);

                    let registration = '';
                    if (event.registration_required) {
                        if (event.registration_url) {
                            registration = `<a href="${event.registration_url}" target="_blank" class="btn btn-primary">Register Now</a>`;
                        } else {
                            registration = `<p><em>Registration required - contact organizer</em></p>`;
                        }
                    }
                    $('#eventRegistration').html(registration);

                    new bootstrap.Modal(document.getElementById('eventModal')).show();
                });
        }

        $('#categoryFilter, #stateFilter').on('change', loadEvents);
        loadEvents();
    </script>
</body>
</html>
