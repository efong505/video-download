<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Subscriber Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Access Your Book Resources</h3>
                        <p class="text-muted text-center">Enter your email to unlock your book preview and resources</p>
                        
                        <form id="check-form">
                            <div class="mb-3">
                                <input type="email" class="form-control form-control-lg" id="email" placeholder="Enter your email" required>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="fas fa-unlock me-2"></i>Unlock My Resources
                            </button>
                        </form>
                        
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/js/all.min.js"></script>
    <script>
        document.getElementById('check-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<div class="alert alert-info">Checking...</div>';
            
            try {
                // Check if email exists in book subscribers
                const response = await fetch(`https://niexv1rw75.execute-api.us-east-1.amazonaws.com/subscribe?action=check_subscriber&email=${encodeURIComponent(email)}`);
                const data = await response.json();
                
                if (data.is_subscriber) {
                    // Set localStorage and redirect
                    localStorage.setItem('book_subscriber', 'true');
                    resultDiv.innerHTML = '<div class="alert alert-success">✓ Access granted! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = 'the-necessary-evil-book.html#preview';
                    }, 1000);
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-warning">Email not found. <a href="the-necessary-evil-book.html#survival-kit">Sign up for free access</a></div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="alert alert-danger">Error checking status. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
