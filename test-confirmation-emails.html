<!DOCTYPE html>
<html>
<head>
    <title>Test Order Confirmation Emails</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>Test Order Confirmation Emails</h4>
            </div>
            <div class="card-body">
                <p>This will send test confirmation emails directly via AWS SES (no database order created)</p>
                <button class="btn btn-success" onclick="testCustomerEmail()">Send Customer Confirmation</button>
                <button class="btn btn-info ms-2" onclick="testBookEmail()">Send Book Signup Confirmation</button>
                <div id="result" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1450.0.min.js"></script>
    <script>
        // Configure AWS SDK (uses CloudFront credentials)
        AWS.config.region = 'us-east-1';
        AWS.config.credentials = new AWS.CognitoIdentityCredentials({
            IdentityPoolId: 'us-east-1:your-identity-pool-id'
        });

        const ses = new AWS.SES();

        function testCustomerEmail() {
            const params = {
                Source: 'Christian Conservatives Today <contact@christianconservativestoday.com>',
                Destination: { ToAddresses: ['hawaiianintucson@gmail.com'] },
                Message: {
                    Subject: { Data: 'Order Confirmation #12345678 - Christian Conservatives Today' },
                    Body: {
                        Text: { Data: `Thank you for your order, Test Customer!

Your order has been received and is being processed.

Order Details:
Order ID: test-12345678
Order Date: 2026-02-18T14:00:00Z

Items Ordered:
  • Test Product (Qty: 1) - $25.00

Order Summary:
Subtotal: $25.00
Tax: $2.00
Total: $27.00

Shipping Address:
123 Test St, Test City, TS 12345

Payment Method: PayPal (TEST)
Order Status: pending

We'll send you another email when your order ships.

Thank you for shopping with us!

Christian Conservatives Today
https://christianconservativestoday.com

Questions? Reply to this email or contact us at contact@christianconservativestoday.com` }
                    }
                }
            };

            document.getElementById('result').innerHTML = '<div class="alert alert-info">Sending...</div>';
            
            // Use Lambda to send (SES requires verified sender)
            fetch('https://k2zbtkeh67.execute-api.us-east-1.amazonaws.com/prod/contact', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    to_email: 'hawaiianintucson@gmail.com',
                    subject: 'TEST - Order Confirmation #12345678',
                    message: params.Message.Body.Text.Data
                })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('result').innerHTML = 
                    '<div class="alert alert-success">Customer confirmation email sent to hawaiianintucson@gmail.com!</div>';
            })
            .catch(err => {
                document.getElementById('result').innerHTML = 
                    '<div class="alert alert-danger">Error: ' + err.message + '</div>';
            });
        }

        function testBookEmail() {
            const message = `Hi Test!

Thank you for joining our book mailing list!

You'll receive:
• Book launch updates and announcements
• Exclusive discount codes for future releases
• Free downloadable study guide for small groups
• Access to author Q&A webinar

Stay tuned for updates!

Christian Conservatives Today
https://christianconservativestoday.com/the-necessary-evil-book.html`;

            document.getElementById('result').innerHTML = '<div class="alert alert-info">Sending...</div>';
            
            fetch('https://k2zbtkeh67.execute-api.us-east-1.amazonaws.com/prod/contact', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    to_email: 'hawaiianintucson@gmail.com',
                    subject: 'TEST - ✓ You\'re on the list! - The Necessary Evil Book Updates',
                    message: message
                })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('result').innerHTML = 
                    '<div class="alert alert-success">Book signup confirmation email sent to hawaiianintucson@gmail.com!</div>';
            })
            .catch(err => {
                document.getElementById('result').innerHTML = 
                    '<div class="alert alert-danger">Error: ' + err.message + '</div>';
            });
        }
    </script>
</body>
</html>
