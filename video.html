<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Video - Christian Conservative Platform</title>
    <meta name="description" content="Watch Christian conservative videos with biblical perspective and faith-based commentary.">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CCT">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="video.other">
    <meta property="og:site_name" content="Christian Conservatives Today">
    <meta property="og:title" content="Christian Conservative Videos" id="og-title">
    <meta property="og:description" content="Watch biblical perspectives on current events, politics, and culture." id="og-description">
    <meta property="og:url" content="https://christianconservativestoday.com/video.html" id="og-url">
    <meta property="og:image" content="https://christianconservativestoday.com/techcrosslogo.jpg" id="og-image">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="player">
    <meta name="twitter:title" content="Christian Conservative Video" id="twitter-title">
    <meta name="twitter:description" content="Watch Christian conservative videos with biblical perspective." id="twitter-description">
    <meta name="twitter:image" content="https://christianconservativestoday.com/techcrosslogo.jpg" id="twitter-image">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="comments.css">
    
    <style>
        body {
            padding-top: 80px;
            background: #f8f9fa;
        }
        .video-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            padding: 0;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .video-player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }
        .video-player-wrapper video,
        .video-player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .video-info {
            padding: 30px;
        }
        .video-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        .video-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .video-tags {
            margin-bottom: 20px;
        }
        .video-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .video-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .sharing-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
            text-align: center;
        }
        .share-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 5px;
            border-radius: 50%;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 45px;
            height: 45px;
            font-size: 20px;
        }
        .share-button:hover {
            transform: translateY(-2px) scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: white;
        }
        .share-facebook { background: #1877f2; }
        .share-twitter { background: #000000; }
        .share-linkedin { background: #0077b5; }
        .share-copy { background: #6c757d; }
        .share-copy.copied { background: #28a745; }
        .related-videos-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .related-video-card {
            display: flex;
            gap: 15px;
            padding: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .related-video-card:hover {
            background: #f8f9fa;
            transform: translateX(5px);
        }
        .related-video-thumb {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 6px;
            background: #ddd;
        }
        .related-video-info {
            flex: 1;
        }
        .related-video-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .related-video-meta {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div id="navbar-container" data-page="videos" data-icon="🎬"></div>

    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <div id="video-container">
                    <div class="text-center" style="padding: 40px;">
                        <div class="spinner-border" role="status"></div>
                        <p class="mt-2">Loading video...</p>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="related-videos-section">
                    <h4>📺 Related Videos</h4>
                    <div id="related-videos-container">
                        <div class="text-center">
                            <div class="spinner-border spinner-border-sm" role="status"></div>
                            <span class="ms-2">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="navbar.js"></script>
    <script src="comments.js"></script>
    <script>
        const BUCKET_URL = 'https://christianconservativestoday.com';
        const TAG_API = 'https://diz6ceeb22.execute-api.us-east-1.amazonaws.com/prod/tags';
        
        let currentVideo = null;
        
        async function loadVideo() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id');
            
            if (!videoId) {
                document.getElementById('video-container').innerHTML = 
                    '<div class="alert alert-danger">Video ID not provided</div>';
                return;
            }
            
            try {
                // Get user info for API call
                const userData = localStorage.getItem('user_data');
                const userEmail = userData ? JSON.parse(userData).email : '';
                const userRole = userData ? JSON.parse(userData).role : '';
                
                // Fetch all videos to find this one
                const response = await fetch(`${TAG_API}?action=list&user=${encodeURIComponent(userEmail)}&role=${encodeURIComponent(userRole)}`);
                const data = await response.json();
                
                if (data.videos) {
                    const video = data.videos.find(v => v.filename === videoId || v.video_id === videoId);
                    
                    if (video) {
                        currentVideo = video;
                        displayVideo(video);
                        loadRelatedVideos(video, data.videos);
                    } else {
                        document.getElementById('video-container').innerHTML = 
                            '<div class="alert alert-danger">Video not found</div>';
                    }
                } else {
                    document.getElementById('video-container').innerHTML = 
                        '<div class="alert alert-danger">Error loading video</div>';
                }
            } catch (error) {
                console.error('Error loading video:', error);
                document.getElementById('video-container').innerHTML = 
                    '<div class="alert alert-danger">Error loading video: ' + error.message + '</div>';
            }
        }
        
        function displayVideo(video) {
            const container = document.getElementById('video-container');
            const videoType = video.video_type || 'local';
            const videoUrl = `${BUCKET_URL}/videos/${video.filename}`;
            const embedUrl = `https://christianconservativestoday.com/embed.html?v=${video.filename}&t=${encodeURIComponent(video.title)}`;
            
            // Update page title and meta tags
            document.title = video.title + ' - Christian Conservatives Today';
            document.getElementById('page-title').textContent = video.title;
            document.getElementById('og-title').setAttribute('content', video.title);
            document.getElementById('twitter-title').setAttribute('content', video.title);
            document.getElementById('og-url').setAttribute('content', window.location.href);
            
            let playerHtml = '';
            
            if (videoType === 'local') {
                playerHtml = `
                    <div class="video-player-wrapper">
                        <video controls>
                            <source src="${videoUrl}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                `;
            } else {
                // External video (YouTube, Rumble, etc.)
                let embedSrc = '';
                const externalUrl = video.external_url || '';
                
                if (externalUrl.includes('youtube.com') || externalUrl.includes('youtu.be')) {
                    const videoId = externalUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/)?.[1];
                    if (videoId) {
                        embedSrc = `https://www.youtube.com/embed/${videoId}`;
                    }
                } else if (externalUrl.includes('rumble.com')) {
                    const rumbleMatch = externalUrl.match(/rumble\.com\/v([a-zA-Z0-9]+)/);
                    if (rumbleMatch) {
                        embedSrc = `https://rumble.com/embed/${rumbleMatch[1]}/`;
                    }
                }
                
                playerHtml = `
                    <div class="video-player-wrapper">
                        <iframe src="${embedSrc}" allowfullscreen 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                        </iframe>
                    </div>
                `;
            }
            
            const tagsHtml = video.tags ? video.tags.map(tag => 
                `<span class="video-tag">${tag}</span>`
            ).join('') : '';
            
            const uploadDate = video.upload_date ? new Date(video.upload_date).toLocaleDateString() : 'Unknown';
            
            // Check if user is admin or video owner
            const userData = localStorage.getItem('user_data');
            const user = userData ? JSON.parse(userData) : null;
            const isAdmin = user && (user.role === 'admin' || user.role === 'super_user');
            const isOwner = user && video.uploader_email && user.email === video.uploader_email;
            const canEdit = isAdmin || isOwner;
            
            const adminControlsHtml = canEdit ? `
                <div class="admin-controls" style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <h6 style="color: #2c5aa0; margin-bottom: 10px;"><i class="fas fa-tools"></i> Video Management</h6>
                    <button onclick="editVideo('${video.filename}')" class="btn btn-warning btn-sm me-2">
                        <i class="fas fa-edit"></i> Edit Video
                    </button>
                    ${isAdmin ? `
                        <button onclick="deleteVideo('${video.filename}', '${video.title}')" class="btn btn-danger btn-sm">
                            <i class="fas fa-trash"></i> Delete Video
                        </button>
                    ` : ''}
                </div>
            ` : '';
            
            container.innerHTML = `
                <div class="video-container">
                    ${playerHtml}
                    <div class="video-info">
                        <h1 class="video-title">${video.title}</h1>
                        <div class="video-meta">
                            <span>📅 ${uploadDate}</span>
                            ${video.duration ? ` • <span>⏱️ ${video.duration}</span>` : ''}
                            ${video.views ? ` • <span>👁️ ${video.views} views</span>` : ''}
                        </div>
                        ${tagsHtml ? `<div class="video-tags">${tagsHtml}</div>` : ''}
                        ${video.description ? `<div class="video-description">${video.description}</div>` : ''}
                        
                        <div class="sharing-section">
                            <h5>📢 Share this video</h5>
                            <p class="text-muted mb-3">Help spread the word about this Christian conservative content</p>
                            <div class="mb-3">
                                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" 
                                   target="_blank" class="share-button share-facebook">
                                    <i class="fab fa-facebook-f"></i>
                                </a>
                                <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(video.title)}" 
                                   target="_blank" class="share-button share-twitter">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 16 16">
                                        <path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865l8.875 11.633Z"/>
                                    </svg>
                                </a>
                                <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" 
                                   target="_blank" class="share-button share-linkedin">
                                    <i class="fab fa-linkedin-in"></i>
                                </a>
                                <button onclick="copyLink('${window.location.href}')" class="share-button share-copy" id="copy-btn">
                                    <i class="fas fa-link"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                ${adminControlsHtml}
                
                <!-- Comments Section -->
                <div class="video-container" style="margin-top: 20px;">
                    <div class="video-info">
                        <div id="comments-section" 
                             data-content-id="${video.filename}" 
                             data-content-type="video">
                        </div>
                    </div>
                </div>
            `;
            
            // Initialize comments
            initComments();
        }
        
        function loadRelatedVideos(currentVideo, allVideos) {
            const container = document.getElementById('related-videos-container');
            
            // Find related videos based on tags
            const related = allVideos
                .filter(v => v.filename !== currentVideo.filename)
                .map(video => {
                    let score = 0;
                    
                    // Same tags = +5 points per tag
                    if (currentVideo.tags && video.tags) {
                        const sharedTags = currentVideo.tags.filter(tag => video.tags.includes(tag));
                        score += sharedTags.length * 5;
                    }
                    
                    return { video, score };
                })
                .filter(item => item.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5)
                .map(item => item.video);
            
            if (related.length === 0) {
                container.innerHTML = '<p class="text-muted">No related videos found.</p>';
                return;
            }
            
            const html = related.map(video => {
                const baseName = video.filename.replace('.mp4', '');
                const thumbnailUrl = `${BUCKET_URL}/thumbnails/${baseName}_thumb_2.jpg`;
                const videoUrl = `video.html?id=${video.filename}`;
                
                return `
                    <div class="related-video-card" onclick="window.location.href='${videoUrl}'">
                        <img src="${thumbnailUrl}" class="related-video-thumb" 
                             onerror="this.style.display='none'" alt="${video.title}">
                        <div class="related-video-info">
                            <div class="related-video-title">${video.title}</div>
                            <div class="related-video-meta">
                                ${video.tags ? video.tags[0] : 'Video'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }
        
        function copyLink(url) {
            const copyBtn = document.getElementById('copy-btn');
            
            navigator.clipboard.writeText(url).then(() => {
                copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-link"></i>';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                prompt('Copy this link:', url);
            });
        }
        
        function editVideo(filename) {
            // Redirect to admin page with video edit mode
            window.location.href = `admin.html?tab=videos&edit=${encodeURIComponent(filename)}`;
        }
        
        async function deleteVideo(filename, title) {
            if (!confirm(`Are you sure you want to delete "${title}"?\n\nThis action cannot be undone.`)) {
                return;
            }
            
            const authToken = localStorage.getItem('auth_token');
            if (!authToken) {
                alert('You must be logged in to delete videos');
                return;
            }
            
            try {
                const response = await fetch('https://diz6ceeb22.execute-api.us-east-1.amazonaws.com/prod/admin?action=delete_video', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ filename: filename })
                });
                
                if (response.ok) {
                    alert('Video deleted successfully');
                    window.location.href = 'videos.html';
                } else {
                    const data = await response.json();
                    alert('Failed to delete video: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Error deleting video: ' + error.message);
            }
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            fetch('navbar.html')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('navbar-container').innerHTML = html;
                    initNavbar();
                });
            loadVideo();
        });
    </script>
    <script src="pwa-install.js"></script>
</body>
</html>
