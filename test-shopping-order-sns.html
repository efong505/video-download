<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Shopping Order SNS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4>Test Shopping Order (SNS Email)</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">This will create a test order via orders_api Lambda, triggering SNS notification to hawaiianintucson@gmail.com</p>
                <button type="button" class="btn btn-success btn-lg w-100" onclick="testSNSOrder()">
                    Create Test Order (Trigger SNS)
                </button>
                <div id="result" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        function testSNSOrder() {
            document.getElementById('result').innerHTML = '<div class="alert alert-info">Creating test order...</div>';
            
            const orderData = {
                user_email: 'test@example.com',
                user_name: 'Test Customer',
                user_phone: '555-1234',
                items: [
                    {
                        product_id: 'test-product-1',
                        name: 'Test Product',
                        price: 25.00,
                        quantity: 1
                    }
                ],
                subtotal: 25.00,
                tax: 2.00,
                total: 27.00,
                shipping_address: {
                    street: '123 Test St',
                    city: 'Test City',
                    state: 'TS',
                    zip: '12345'
                },
                payment_method: 'PayPal (TEST)'
            };
            
            fetch('https://diz6ceeb22.execute-api.us-east-1.amazonaws.com/prod/orders?action=create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.order_id) {
                    document.getElementById('result').innerHTML = 
                        `<div class="alert alert-success">
                            <strong>Success!</strong><br>
                            Order ID: ${data.order_id}<br>
                            SNS email sent to: hawaiianintucson@gmail.com<br>
                            Check your inbox!
                        </div>`;
                } else {
                    document.getElementById('result').innerHTML = 
                        '<div class="alert alert-warning">Order created but check response: ' + JSON.stringify(data) + '</div>';
                }
            })
            .catch(error => {
                document.getElementById('result').innerHTML = 
                    '<div class="alert alert-danger"><strong>Error:</strong> ' + error.message + '</div>';
            });
        }
    </script>
</body>
</html>
