<!DOCTYPE html>
<html>
<head>
    <title>Test Order Flow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4>Test Complete Order Flow</h4>
            </div>
            <div class="card-body">
                <p>This will create a real order with actual products from the Products table</p>
                <button class="btn btn-success btn-lg" onclick="testOrder()">Place Test Order</button>
                <div id="result" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        // Unregister service worker if present
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                registrations.forEach(reg => reg.unregister());
            });
        }

        function testOrder() {
            document.getElementById('result').innerHTML = '<div class="alert alert-info">Creating order...</div>';
            
            const orderData = {
                user_email: 'hawaiianintucson@gmail.com',
                user_name: 'Test Customer',
                user_phone: '555-1234',
                items: [
                    {
                        product_id: 'book-paperback-001',
                        name: 'The Necessary Evil - Paperback',
                        price: 25.00,
                        quantity: 1
                    }
                ],
                subtotal: 25.00,
                tax: 2.00,
                total: 27.00,
                shipping_address: {
                    street: '123 Test St',
                    city: 'Test City',
                    state: 'TS',
                    zip: '12345'
                },
                payment_method: 'PayPal (TEST)'
            };
            
            fetch('https://diz6ceeb22.execute-api.us-east-1.amazonaws.com/prod/orders?action=create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.order_id) {
                    document.getElementById('result').innerHTML = 
                        `<div class="alert alert-success">
                            <strong>✅ Order Created Successfully!</strong><br>
                            Order ID: ${data.order_id}<br><br>
                            <strong>Check your email:</strong><br>
                            • Customer confirmation → hawaiianintucson@gmail.com<br>
                            • SNS notification → hawaiianintucson@gmail.com<br><br>
                            <strong>Product stock updated:</strong> book-paperback-001 (100 → 99)
                        </div>`;
                } else {
                    document.getElementById('result').innerHTML = 
                        '<div class="alert alert-warning">Response: ' + JSON.stringify(data) + '</div>';
                }
            })
            .catch(error => {
                document.getElementById('result').innerHTML = 
                    '<div class="alert alert-danger"><strong>Error:</strong> ' + error.message + '</div>';
            });
        }
    </script>
</body>
</html>
