<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Christian Conservatives Today</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .cart-item { background: white; border-radius: 8px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .total-box { background: #667eea; color: white; padding: 30px; border-radius: 8px; }
        .login-nudge { background: #e8f0fe; border: 1px solid #4285f4; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        #paypal-button-container { margin-top: 15px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Christian Conservatives Today</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
                    <li class="nav-item" id="nav-auth"></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">Shopping Cart</h1>

        <div class="row">
            <div class="col-md-8">
                <div id="cart-items"></div>
            </div>

            <div class="col-md-4">
                <div id="login-nudge-area"></div>
                <div class="total-box">
                    <h3>Order Summary</h3>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Tax (8%):</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <strong>Total:</strong>
                        <strong id="total">$0.00</strong>
                    </div>
                    <button class="btn btn-success w-100 py-3 fs-5" id="checkout-btn" onclick="showCheckoutForm()">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Checkout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="logged-in-info" style="display:none">
                        <div class="alert alert-success">
                            Logged in as <strong id="user-display"></strong>
                        </div>
                    </div>
                    <form id="checkout-form">
                        <div id="guest-fields">
                            <div class="mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" id="guest-email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Full Name *</label>
                                <input type="text" class="form-control" id="guest-name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="guest-phone">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Shipping Address *</label>
                            <textarea class="form-control" id="guest-address" rows="3" required></textarea>
                        </div>
                    </form>
                    <hr>
                    <h6>Pay with PayPal</h6>
                    <div id="paypal-button-container"></div>
                    <div id="payment-status" class="mt-3" style="display:none"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=BAA--AF-Rfxb87md9-SMskKQ2ZyUfT4Y0Km0DUHNnKQloxOzPgs1yp4eM8WzMhQsDRTTlau86n_kVlipxY&currency=USD"></script>
    <script>
        const API_ORDERS = 'https://ydq9xzya5d.execute-api.us-east-1.amazonaws.com/prod/orders';
        let checkoutModal;

        function getAuth() {
            const token = localStorage.getItem('auth_token');
            const userData = JSON.parse(localStorage.getItem('user_data') || 'null');
            return (token && userData) ? { token, user: userData } : null;
        }

        function updateNavAuth() {
            const auth = getAuth();
            const el = document.getElementById('nav-auth');
            if (auth) {
                el.innerHTML = `<a class="nav-link" href="../login.html">${auth.user.name || auth.user.email}</a>`;
            } else {
                el.innerHTML = `<a class="nav-link" href="../login.html?redirect=Shopping/cart.html">Login</a>`;
            }
        }

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cart-items');

            if (cart.length === 0) {
                container.innerHTML = `<div class="alert alert-info">Your cart is empty. <a href="shop.html">Continue shopping</a></div>`;
                document.getElementById('checkout-btn').style.display = 'none';
                updateTotals();
                return;
            }

            document.getElementById('checkout-btn').style.display = 'block';
            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h5>${item.name}</h5>
                            <p class="text-muted mb-0">$${item.price.toFixed(2)} each</p>
                        </div>
                        <div class="col-md-3">
                            <div class="input-group">
                                <button class="btn btn-outline-secondary" onclick="updateQuantity(${index}, -1)">-</button>
                                <input type="text" class="form-control text-center" value="${item.quantity}" readonly>
                                <button class="btn btn-outline-secondary" onclick="updateQuantity(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div class="col-md-2 text-end">
                            <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
                        </div>
                        <div class="col-md-1 text-end">
                            <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">×</button>
                        </div>
                    </div>
                </div>
            `).join('');

            updateTotals();

            // Show login nudge for guests
            const auth = getAuth();
            const nudgeArea = document.getElementById('login-nudge-area');
            if (!auth) {
                nudgeArea.innerHTML = `<div class="login-nudge"><strong>Have an account?</strong> <a href="../login.html?redirect=Shopping/cart.html">Log in</a> for faster checkout and order tracking.</div>`;
            } else {
                nudgeArea.innerHTML = '';
            }
        }

        function updateQuantity(index, change) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function getCartTotals() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.08;
            return { subtotal, tax, total: subtotal + tax };
        }

        function updateTotals() {
            const { subtotal, tax, total } = getCartTotals();
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }

        function showCheckoutForm() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) return;

            const auth = getAuth();
            const guestFields = document.getElementById('guest-fields');
            const loggedInInfo = document.getElementById('logged-in-info');

            if (auth) {
                guestFields.style.display = 'none';
                loggedInInfo.style.display = 'block';
                document.getElementById('user-display').textContent = auth.user.name || auth.user.email;
                // Remove required from hidden guest fields
                document.getElementById('guest-email').required = false;
                document.getElementById('guest-name').required = false;
            } else {
                guestFields.style.display = 'block';
                loggedInInfo.style.display = 'none';
                document.getElementById('guest-email').required = true;
                document.getElementById('guest-name').required = true;
            }

            checkoutModal = new bootstrap.Modal(document.getElementById('checkoutModal'));
            checkoutModal.show();
            renderPayPalButtons();
        }

        function getCheckoutInfo() {
            const auth = getAuth();
            if (auth) {
                return {
                    email: auth.user.email,
                    name: auth.user.name || `${auth.user.first_name || ''} ${auth.user.last_name || ''}`.trim(),
                    phone: '',
                    address: document.getElementById('guest-address').value
                };
            }
            return {
                email: document.getElementById('guest-email').value,
                name: document.getElementById('guest-name').value,
                phone: document.getElementById('guest-phone').value,
                address: document.getElementById('guest-address').value
            };
        }

        function renderPayPalButtons() {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = '';

            paypal.Buttons({
                createOrder: function(data, actions) {
                    // Validate form
                    const form = document.getElementById('checkout-form');
                    if (!form.checkValidity()) {
                        form.reportValidity();
                        return actions.reject();
                    }

                    const { total } = getCartTotals();
                    const info = getCheckoutInfo();

                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: total.toFixed(2) },
                            description: `Order for ${info.name}`,
                            shipping: {
                                name: { full_name: info.name },
                                address: { address_line_1: info.address }
                            }
                        }]
                    });
                },
                onApprove: async function(data, actions) {
                    const statusDiv = document.getElementById('payment-status');
                    statusDiv.style.display = 'block';
                    statusDiv.innerHTML = '<div class="alert alert-info">Processing payment...</div>';

                    try {
                        const details = await actions.order.capture();
                        statusDiv.innerHTML = '<div class="alert alert-info">Payment received! Creating your order...</div>';
                        await createOrder(details, data.orderID);
                    } catch (err) {
                        statusDiv.innerHTML = `<div class="alert alert-danger">Payment error: ${err.message}</div>`;
                    }
                },
                onError: function(err) {
                    document.getElementById('payment-status').innerHTML = `<div class="alert alert-danger">PayPal error: ${err.message || 'Please try again.'}</div>`;
                    document.getElementById('payment-status').style.display = 'block';
                }
            }).render('#paypal-button-container');
        }

        async function createOrder(paypalDetails, paypalOrderId) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const { subtotal, tax, total } = getCartTotals();
            const info = getCheckoutInfo();
            const auth = getAuth();

            const orderData = {
                items: cart.map(item => ({
                    product_id: item.product_id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity
                })),
                subtotal, tax, total,
                payment_method: 'PayPal',
                payment_status: 'paid',
                initial_status: 'processing',
                paypal_order_id: paypalOrderId,
                user_email: info.email,
                user_name: info.name,
                user_phone: info.phone,
                shipping_address: info.address
            };

            const headers = { 'Content-Type': 'application/json' };
            if (auth) headers['Authorization'] = `Bearer ${auth.token}`;

            const response = await fetch(`${API_ORDERS}?action=create`, {
                method: 'POST',
                headers,
                body: JSON.stringify(orderData)
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.removeItem('cart');
                const statusDiv = document.getElementById('payment-status');
                statusDiv.innerHTML = `<div class="alert alert-success">
                    <h5>Order Placed Successfully!</h5>
                    <p>Order ID: ${result.order_id}</p>
                    <p>Confirmation sent to: ${info.email}</p>
                    <p>PayPal Transaction: ${paypalOrderId}</p>
                </div>`;

                setTimeout(() => {
                    if (checkoutModal) checkoutModal.hide();
                    window.location.href = auth ? 'orders.html' : 'shop.html';
                }, 3000);
            } else {
                document.getElementById('payment-status').innerHTML = `<div class="alert alert-danger">Order error: ${result.error}</div>`;
            }
        }

        updateNavAuth();
        loadCart();
    </script>
</body>
</html>
