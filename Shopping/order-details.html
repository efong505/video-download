<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .timeline {
            position: relative;
            padding: 20px 0;
        }
        .timeline-item {
            position: relative;
            padding-left: 40px;
            padding-bottom: 30px;
        }
        .timeline-item:before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: -30px;
            width: 2px;
            background: #dee2e6;
        }
        .timeline-item:last-child:before {
            display: none;
        }
        .timeline-dot {
            position: absolute;
            left: 0;
            top: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #6c757d;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px #dee2e6;
        }
        .timeline-dot.active {
            background: #0d6efd;
            box-shadow: 0 0 0 2px #0d6efd;
        }
        .timeline-dot.completed {
            background: #198754;
            box-shadow: 0 0 0 2px #198754;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Christian Conservatives Today</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">My Orders</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Order Details</h1>
            <a href="orders.html" class="btn btn-outline-secondary">← Back to Orders</a>
        </div>

        <div id="order-details"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'https://ydq9xzya5d.execute-api.us-east-1.amazonaws.com/prod/orders';

        async function loadOrderDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');
            
            if (!orderId) {
                window.location.href = 'orders.html';
                return;
            }

            const token = localStorage.getItem('auth_token');
            const userData = JSON.parse(localStorage.getItem('user_data') || '{}');
            const userId = userData.email;
            
            if (!token || !userId) {
                window.location.href = '../login.html?redirect=Shopping/order-details.html?id=' + orderId;
                return;
            }
            
            try {
                const response = await fetch(`${API}?action=get&order_id=${orderId}&user_id=${userId}`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const data = await response.json();

                if (!data.order) {
                    document.getElementById('order-details').innerHTML = '<div class="alert alert-danger">Order not found.</div>';
                    return;
                }

                renderOrderDetails(data.order);
            } catch (error) {
                console.error('Error loading order:', error);
                document.getElementById('order-details').innerHTML = '<div class="alert alert-danger">Error loading order details.</div>';
            }
        }

        function renderOrderDetails(order) {
            const canCancel = order.status === 'pending' || order.status === 'processing';
            
            document.getElementById('order-details').innerHTML = `
                <div class="row">
                    <!-- Order Summary -->
                    <div class="col-md-8">
                        <div class="card mb-4">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">Order #${order.order_id.substring(0, 8)}</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <p class="mb-1"><strong>Order Date:</strong> ${new Date(order.created_at).toLocaleString()}</p>
                                        <p class="mb-1"><strong>Status:</strong> <span class="badge bg-${getStatusColor(order.status)}">${order.status.toUpperCase()}</span></p>
                                    </div>
                                    <div class="col-md-6 text-end">
                                        <h3 class="text-primary mb-0">$${parseFloat(order.total).toFixed(2)}</h3>
                                        <small class="text-muted">Total Amount</small>
                                    </div>
                                </div>

                                ${canCancel ? `
                                    <button class="btn btn-danger btn-sm" onclick="cancelOrder('${order.order_id}')">
                                        Cancel Order
                                    </button>
                                ` : ''}
                            </div>
                        </div>

                        <!-- Order Items -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5 class="mb-0">Order Items</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table">
                                        <thead>
                                            <tr>
                                                <th>Product</th>
                                                <th>Price</th>
                                                <th>Quantity</th>
                                                <th class="text-end">Subtotal</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${order.items.map(item => `
                                                <tr>
                                                    <td>
                                                        <strong>${item.name}</strong>
                                                        ${item.description ? `<br><small class="text-muted">${item.description}</small>` : ''}
                                                    </td>
                                                    <td>$${parseFloat(item.price).toFixed(2)}</td>
                                                    <td>${item.quantity}</td>
                                                    <td class="text-end">$${(item.price * item.quantity).toFixed(2)}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td colspan="3" class="text-end"><strong>Total:</strong></td>
                                                <td class="text-end"><strong>$${parseFloat(order.total).toFixed(2)}</strong></td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- Shipping Information -->
                        ${order.shipping_address ? `
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0">Shipping Information</h5>
                                </div>
                                <div class="card-body">
                                    <p class="mb-1"><strong>${order.shipping_address.name || 'N/A'}</strong></p>
                                    <p class="mb-1">${order.shipping_address.address_line1 || ''}</p>
                                    ${order.shipping_address.address_line2 ? `<p class="mb-1">${order.shipping_address.address_line2}</p>` : ''}
                                    <p class="mb-1">${order.shipping_address.city || ''}, ${order.shipping_address.state || ''} ${order.shipping_address.zip || ''}</p>
                                    <p class="mb-0">${order.shipping_address.country || 'USA'}</p>
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    <!-- Order Status Timeline -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">Order Status</h5>
                            </div>
                            <div class="card-body">
                                <div class="timeline">
                                    ${renderTimeline(order.status, order.status_history || [])}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTimeline(currentStatus, statusHistory) {
            const statuses = [
                { key: 'pending', label: 'Order Placed', icon: '📝' },
                { key: 'processing', label: 'Processing', icon: '⚙️' },
                { key: 'shipped', label: 'Shipped', icon: '📦' },
                { key: 'delivered', label: 'Delivered', icon: '✅' }
            ];

            if (currentStatus === 'cancelled') {
                return `
                    <div class="timeline-item">
                        <div class="timeline-dot" style="background: #dc3545;"></div>
                        <div>
                            <strong>❌ Order Cancelled</strong>
                            <div class="text-muted small">${new Date().toLocaleString()}</div>
                        </div>
                    </div>
                `;
            }

            const currentIndex = statuses.findIndex(s => s.key === currentStatus);

            return statuses.map((status, index) => {
                const isCompleted = index < currentIndex;
                const isActive = index === currentIndex;
                const dotClass = isCompleted ? 'completed' : (isActive ? 'active' : '');

                return `
                    <div class="timeline-item">
                        <div class="timeline-dot ${dotClass}"></div>
                        <div>
                            <strong>${status.icon} ${status.label}</strong>
                            ${isCompleted || isActive ? `<div class="text-muted small">${new Date().toLocaleString()}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusColor(status) {
            const colors = {
                'pending': 'warning',
                'processing': 'info',
                'shipped': 'primary',
                'delivered': 'success',
                'cancelled': 'danger'
            };
            return colors[status] || 'secondary';
        }

        async function cancelOrder(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) {
                return;
            }

            const token = localStorage.getItem('auth_token');
            const userData = JSON.parse(localStorage.getItem('user_data') || '{}');
            const userId = userData.email;

            try {
                const response = await fetch(API, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'cancel',
                        order_id: orderId,
                        user_id: userId
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Order cancelled successfully!');
                    location.reload();
                } else {
                    alert('Error cancelling order: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error cancelling order:', error);
                alert('Error cancelling order. Please try again.');
            }
        }

        loadOrderDetails();
    </script>
</body>
</html>
