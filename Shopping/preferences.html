<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Preferences - Christian Conservatives Today</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .pref-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; max-width: 600px; margin: 40px auto; }
        .form-check { padding: 12px 0 12px 2.5em; border-bottom: 1px solid #eee; }
        .form-check:last-of-type { border-bottom: none; }
        .form-check-label { font-weight: 500; }
        .form-check small { display: block; color: #666; margin-top: 2px; }
        .unsubscribed-msg { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Christian Conservatives Today</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="pref-card" id="prefs-form-card">
            <h2 class="mb-4">Email Preferences</h2>
            <p class="text-muted">Choose which emails you'd like to receive from us.</p>

            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
            </div>

            <hr>
            <h5 class="mb-3">Notification Types</h5>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="abandoned_cart_emails" checked>
                <label class="form-check-label" for="abandoned_cart_emails">
                    Abandoned Cart Reminders
                    <small>Get a reminder when you leave items in your cart</small>
                </label>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="browse_abandonment_emails" checked>
                <label class="form-check-label" for="browse_abandonment_emails">
                    Product Recommendations
                    <small>Suggestions based on products you've viewed</small>
                </label>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="price_drop_alerts" checked>
                <label class="form-check-label" for="price_drop_alerts">
                    Price Drop Alerts
                    <small>Get notified when watched products go on sale</small>
                </label>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="back_in_stock_alerts" checked>
                <label class="form-check-label" for="back_in_stock_alerts">
                    Back in Stock Alerts
                    <small>Know when out-of-stock items are available again</small>
                </label>
            </div>

            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="newsletter" checked>
                <label class="form-check-label" for="newsletter">
                    Newsletter
                    <small>Weekly updates and featured content</small>
                </label>
            </div>

            <hr>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <button class="btn btn-primary" onclick="savePreferences()">Save Preferences</button>
                <button class="btn btn-outline-danger btn-sm" onclick="unsubscribeAll()">Unsubscribe from All</button>
            </div>
            <div id="save-msg" class="mt-3" style="display:none"></div>
        </div>

        <div class="pref-card" id="unsubscribed-card" style="display:none">
            <div class="unsubscribed-msg">
                <h2>You've Been Unsubscribed</h2>
                <p class="text-muted">You will no longer receive marketing emails from us.</p>
                <p>Changed your mind? <a href="#" onclick="resubscribe()">Re-subscribe</a></p>
                <a href="shop.html" class="btn btn-primary mt-3">Back to Shop</a>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://ydq9xzya5d.execute-api.us-east-1.amazonaws.com/prod/marketing';
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('user_id') || localStorage.getItem('user_id') || localStorage.getItem('tracking_session_id') || '';

        const PREF_FIELDS = ['abandoned_cart_emails', 'browse_abandonment_emails', 'price_drop_alerts', 'back_in_stock_alerts', 'newsletter'];

        // Handle unsubscribe via URL
        if (params.get('action') === 'unsubscribe' && userId) {
            document.getElementById('prefs-form-card').style.display = 'none';
            document.getElementById('unsubscribed-card').style.display = 'block';
            fetch(`${API}?action=preferences-update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, unsubscribed: true, email: ''})
            });
        } else {
            loadPreferences();
        }

        async function loadPreferences() {
            if (!userId) return;
            try {
                const resp = await fetch(`${API}?action=preferences-get&user_id=${userId}`);
                const data = await resp.json();
                const prefs = data.preferences;

                if (prefs.email) document.getElementById('email').value = prefs.email;
                if (prefs.unsubscribed) {
                    document.getElementById('prefs-form-card').style.display = 'none';
                    document.getElementById('unsubscribed-card').style.display = 'block';
                    return;
                }
                PREF_FIELDS.forEach(f => {
                    const el = document.getElementById(f);
                    if (el) el.checked = prefs[f] !== false;
                });
            } catch (e) { console.error('Load prefs error:', e); }
        }

        async function savePreferences() {
            const body = {
                user_id: userId,
                email: document.getElementById('email').value,
                unsubscribed: false
            };
            PREF_FIELDS.forEach(f => { body[f] = document.getElementById(f).checked; });
            body.marketing_emails = PREF_FIELDS.some(f => body[f]);

            try {
                await fetch(`${API}?action=preferences-update`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                showMsg('Preferences saved!', 'success');
            } catch (e) { showMsg('Error saving preferences', 'danger'); }
        }

        async function unsubscribeAll() {
            if (!confirm('Are you sure you want to unsubscribe from all marketing emails?')) return;
            await fetch(`${API}?action=preferences-update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, email: document.getElementById('email').value, unsubscribed: true})
            });
            document.getElementById('prefs-form-card').style.display = 'none';
            document.getElementById('unsubscribed-card').style.display = 'block';
        }

        async function resubscribe() {
            await fetch(`${API}?action=preferences-update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, unsubscribed: false, email: ''})
            });
            document.getElementById('unsubscribed-card').style.display = 'none';
            document.getElementById('prefs-form-card').style.display = 'block';
            loadPreferences();
        }

        function showMsg(text, type) {
            const el = document.getElementById('save-msg');
            el.className = `mt-3 alert alert-${type}`;
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
