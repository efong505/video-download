<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Christian Conservatives Today</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link active" href="orders.html">My Orders</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">My Orders</h1>

        <div id="orders-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'https://ydq9xzya5d.execute-api.us-east-1.amazonaws.com/prod/orders';

        async function loadOrders() {
            const response = await fetch(`${API}?action=list&user_id=guest`);
            const data = await response.json();

            const container = document.getElementById('orders-list');
            
            if (data.orders.length === 0) {
                container.innerHTML = '<p>No orders yet. <a href="shop.html">Start shopping!</a></p>';
                return;
            }

            container.innerHTML = data.orders.map(order => `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <h5>Order #${order.order_id.substring(0, 8)}</h5>
                                <p class="mb-1"><strong>Date:</strong> ${new Date(order.created_at).toLocaleDateString()}</p>
                                <p class="mb-1"><strong>Status:</strong> <span class="badge bg-${getStatusColor(order.status)}">${order.status}</span></p>
                                <p class="mb-1"><strong>Items:</strong> ${order.items.length} item(s)</p>
                                <div class="mt-2">
                                    ${order.items.map(item => `
                                        <div class="text-muted small">
                                            ${item.name} x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="col-md-4 text-end">
                                <h4 class="text-primary">$${parseFloat(order.total).toFixed(2)}</h4>
                                <button class="btn btn-sm btn-outline-primary mt-2" onclick="viewOrder('${order.order_id}')">View Details</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = {
                'pending': 'warning',
                'processing': 'info',
                'shipped': 'primary',
                'delivered': 'success',
                'cancelled': 'danger'
            };
            return colors[status] || 'secondary';
        }

        function viewOrder(orderId) {
            alert(`Order details for ${orderId} - Full details page coming soon!`);
        }

        loadOrders();
    </script>
</body>
</html>
