<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subscribers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 80px; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <h1>👥 Manage Subscribers</h1>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">➕ Add Subscriber</button>
                <a href="user-email-dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Tags</th>
                            <th>Status</th>
                            <th>Subscribed</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="subscribers-table">
                        <tr><td colspan="5">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Subscriber Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Subscriber</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="mb-3">
                            <label>Email *</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label>First Name *</label>
                            <input type="text" class="form-control" id="first_name" required>
                        </div>
                        <div class="mb-3">
                            <label>Last Name</label>
                            <input type="text" class="form-control" id="last_name">
                        </div>
                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="tel" class="form-control" id="phone">
                        </div>
                        <div class="mb-3">
                            <label>Tags (comma-separated)</label>
                            <input type="text" class="form-control" id="tags" placeholder="e.g. newsletter, vip, donors">
                            <small class="text-muted">Use tags to segment your audience for targeted campaigns</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addSubscriber()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="navbar.js"></script>
    <script>
        const API_URL = 'https://olmcyxwc1a.execute-api.us-east-1.amazonaws.com/prod/user-email';
        const token = localStorage.getItem('auth_token');

        async function loadSubscribers() {
            const response = await fetch(`${API_URL}?action=list_subscribers`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (data.subscribers && data.subscribers.length > 0) {
                document.getElementById('subscribers-table').innerHTML = data.subscribers.map(s => `
                    <tr>
                        <td>${s.subscriber_email}</td>
                        <td>${s.first_name} ${s.last_name || ''}</td>
                        <td>${s.tags ? s.tags.map(t => `<span class="badge bg-info">${t}</span>`).join(' ') : '<span class="text-muted">No tags</span>'}</td>
                        <td><span class="badge bg-success">${s.status}</span></td>
                        <td>${new Date(s.subscribed_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteSubscriber('${s.subscriber_email}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('subscribers-table').innerHTML = '<tr><td colspan="6">No subscribers yet</td></tr>';
            }
        }

        async function addSubscriber() {
            const tagsInput = document.getElementById('tags').value;
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(t => t) : [];
            
            const data = {
                email: document.getElementById('email').value,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                phone: document.getElementById('phone').value,
                tags: tags
            };

            const response = await fetch(`${API_URL}?action=add_subscriber`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            if (response.ok) {
                alert('Subscriber added!');
                bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                document.getElementById('addForm').reset();
                loadSubscribers();
            } else {
                alert(result.error || 'Failed to add subscriber');
            }
        }

        async function deleteSubscriber(email) {
            if (!confirm(`Delete ${email}?`)) return;

            const response = await fetch(`${API_URL}?action=delete_subscriber`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email })
            });

            if (response.ok) {
                alert('Subscriber deleted');
                loadSubscribers();
            }
        }

        loadSubscribers();
    </script>
</body>
</html>
