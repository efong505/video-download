<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Files - CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-cloud-arrow-up-fill"></i> CloudVault
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">
                    <i class="bi bi-person-circle"></i> <span id="userName"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 bg-light sidebar py-4">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-house-door"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="files.html">
                            <i class="bi bi-folder"></i> My Files
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="upgrade.html">
                            <i class="bi bi-arrow-up-circle"></i> Upgrade
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="settings.html">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 py-4">
                <h2 class="mb-4">My Files</h2>

                <!-- Upload Zone -->
                <div class="upload-zone mb-4" id="uploadZone">
                    <i class="bi bi-cloud-upload" style="font-size: 3rem; color: #6c757d;"></i>
                    <h5 class="mt-3">Drag & Drop Files Here</h5>
                    <p class="text-muted">or click to browse</p>
                    <input type="file" id="fileInput" class="d-none" multiple>
                    <button class="btn btn-primary mt-2" onclick="document.getElementById('fileInput').click()">
                        <i class="bi bi-plus-circle"></i> Select Files
                    </button>
                </div>

                <!-- Upload Progress -->
                <div id="uploadProgress" class="d-none mb-4">
                    <div class="card">
                        <div class="card-body">
                            <h6>Uploading: <span id="uploadFileName"></span></h6>
                            <div class="progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                     id="uploadProgressBar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Files List -->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title mb-0">All Files (<span id="fileCount">0</span>)</h5>
                            <button class="btn btn-sm btn-outline-primary" onclick="loadFiles()">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                        </div>
                        <div id="filesList">
                            <div class="text-center text-muted py-5">
                                <div class="spinner-border" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        checkAuth();
        document.getElementById('userName').textContent = localStorage.getItem('name');
        
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        
        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            handleFiles(files);
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        
        async function handleFiles(files) {
            for (let file of files) {
                await uploadFile(file);
            }
            loadFiles();
        }
        
        async function uploadFile(file) {
            const uploadProgress = document.getElementById('uploadProgress');
            const uploadFileName = document.getElementById('uploadFileName');
            const uploadProgressBar = document.getElementById('uploadProgressBar');
            
            uploadProgress.classList.remove('d-none');
            uploadFileName.textContent = file.name;
            uploadProgressBar.style.width = '50%';
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const base64Content = e.target.result.split(',')[1];
                    
                    const response = await fetch(`${API_URL}/storage`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            fileName: file.name,
                            fileSize: file.size,
                            fileContent: base64Content,
                            fileType: file.type
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        uploadProgressBar.style.width = '100%';
                        showAlert(`${file.name} uploaded successfully!`, 'success');
                        setTimeout(() => {
                            uploadProgress.classList.add('d-none');
                            uploadProgressBar.style.width = '0%';
                        }, 1000);
                    } else {
                        showAlert(data.error || 'Upload failed', 'danger');
                        uploadProgress.classList.add('d-none');
                    }
                } catch (error) {
                    showAlert('Upload failed. Please try again.', 'danger');
                    uploadProgress.classList.add('d-none');
                }
            };
            reader.readAsDataURL(file);
        }
        
        async function loadFiles() {
            try {
                const response = await fetch(`${API_URL}/storage`, {
                    headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('fileCount').textContent = data.count;
                    
                    if (data.files.length === 0) {
                        document.getElementById('filesList').innerHTML = `
                            <div class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                                <p class="mt-2">No files yet. Upload your first file!</p>
                            </div>
                        `;
                    } else {
                        const filesHtml = data.files.map(file => `
                            <div class="file-item d-flex align-items-center justify-content-between">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-file-earmark file-icon text-primary"></i>
                                    <div>
                                        <strong>${file.fileName}</strong>
                                        <br>
                                        <small class="text-muted">${formatFileSize(file.fileSize)} • ${formatDate(file.lastModified)}</small>
                                    </div>
                                </div>
                                <div>
                                    <button class="btn btn-sm btn-outline-primary me-2" onclick="downloadFile('${file.fileName}')">
                                        <i class="bi bi-download"></i> Download
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteFile('${file.fileName}')">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </div>
                            </div>
                        `).join('');
                        
                        document.getElementById('filesList').innerHTML = filesHtml;
                    }
                }
            } catch (error) {
                showAlert('Error loading files', 'danger');
            }
        }
        
        async function downloadFile(fileName) {
            try {
                const response = await fetch(`${API_URL}/storage?fileName=${encodeURIComponent(fileName)}`, {
                    headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.open(data.downloadUrl, '_blank');
                } else {
                    showAlert('Download failed', 'danger');
                }
            } catch (error) {
                showAlert('Download failed', 'danger');
            }
        }
        
        async function deleteFile(fileName) {
            if (!confirm(`Are you sure you want to delete ${fileName}?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/storage?fileName=${encodeURIComponent(fileName)}`, {
                    method: 'DELETE',
                    headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('File deleted successfully', 'success');
                    loadFiles();
                } else {
                    showAlert(data.error || 'Delete failed', 'danger');
                }
            } catch (error) {
                showAlert('Delete failed', 'danger');
            }
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(2) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString();
        }
        
        function showAlert(message, type) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show alert-floating" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            document.getElementById('alertContainer').innerHTML = alertHtml;
            setTimeout(() => {
                const alert = document.querySelector('.alert');
                if (alert) alert.remove();
            }, 5000);
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        loadFiles();
    </script>
</body>
</html>
