<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-cloud-arrow-up-fill"></i> CloudVault
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">
                    <i class="bi bi-person-circle"></i> <span id="userName"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 bg-light sidebar py-4">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">
                            <i class="bi bi-house-door"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="files.html">
                            <i class="bi bi-folder"></i> My Files
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="upgrade.html">
                            <i class="bi bi-arrow-up-circle"></i> Upgrade
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="settings.html">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 py-4">
                <h2 class="mb-4">Dashboard</h2>

                <!-- Storage Overview -->
                <div class="row mb-4">
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Storage Usage</h5>
                                <div class="d-flex justify-content-between mb-2">
                                    <span id="storageText">0 GB of 0 GB used</span>
                                    <span id="storagePercent">0%</span>
                                </div>
                                <div class="storage-bar">
                                    <div class="storage-bar-fill" id="storageBarFill" style="width: 0%"></div>
                                </div>
                                <div class="mt-3">
                                    <span class="badge badge-tier" id="tierBadge">Free</span>
                                    <a href="upgrade.html" class="btn btn-sm btn-primary ms-2">Upgrade Plan</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm stat-card">
                            <div class="card-body text-center">
                                <i class="bi bi-file-earmark" style="font-size: 3rem;"></i>
                                <h3 class="mt-2" id="fileCount">0</h3>
                                <p class="mb-0">Total Files</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="row mb-4">
                    <div class="col-12">
                        <h5 class="mb-3">Quick Actions</h5>
                        <div class="d-flex gap-2">
                            <a href="files.html" class="btn btn-primary">
                                <i class="bi bi-cloud-upload"></i> Upload Files
                            </a>
                            <a href="files.html" class="btn btn-outline-primary">
                                <i class="bi bi-folder"></i> Browse Files
                            </a>
                            <a href="upgrade.html" class="btn btn-outline-success">
                                <i class="bi bi-star"></i> Upgrade Storage
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Recent Files -->
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Recent Files</h5>
                                <div id="recentFiles">
                                    <div class="text-center text-muted py-4">
                                        <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                                        <p class="mt-2">No files uploaded yet</p>
                                        <a href="files.html" class="btn btn-primary">Upload Your First File</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        checkAuth();
        
        async function loadDashboard() {
            const name = localStorage.getItem('name');
            document.getElementById('userName').textContent = name;
            
            // Load subscription status
            try {
                const response = await fetch(`${API_URL}/subscription?action=get_status`, {
                    headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const storageUsedGB = (data.storageUsed / 1073741824).toFixed(2);
                    const storageQuotaGB = (data.storageQuota / 1073741824).toFixed(0);
                    
                    document.getElementById('storageText').textContent = 
                        `${storageUsedGB} GB of ${storageQuotaGB} GB used`;
                    document.getElementById('storagePercent').textContent = 
                        `${data.storagePercent}%`;
                    document.getElementById('storageBarFill').style.width = 
                        `${data.storagePercent}%`;
                    
                    const tierBadge = document.getElementById('tierBadge');
                    tierBadge.textContent = data.tier.charAt(0).toUpperCase() + data.tier.slice(1);
                    tierBadge.className = `badge badge-tier badge-${data.tier}`;
                }
            } catch (error) {
                console.error('Error loading subscription:', error);
            }
            
            // Load files
            try {
                const response = await fetch(`${API_URL}/storage`, {
                    headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
                });
                
                const data = await response.json();
                
                if (response.ok && data.files.length > 0) {
                    document.getElementById('fileCount').textContent = data.count;
                    
                    const recentFiles = data.files.slice(0, 5);
                    const filesHtml = recentFiles.map(file => `
                        <div class="file-item d-flex align-items-center justify-content-between">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-file-earmark file-icon text-primary"></i>
                                <div>
                                    <strong>${file.fileName}</strong>
                                    <br>
                                    <small class="text-muted">${formatFileSize(file.fileSize)} • ${formatDate(file.lastModified)}</small>
                                </div>
                            </div>
                            <a href="files.html" class="btn btn-sm btn-outline-primary">View</a>
                        </div>
                    `).join('');
                    
                    document.getElementById('recentFiles').innerHTML = filesHtml;
                }
            } catch (error) {
                console.error('Error loading files:', error);
            }
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(2) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString();
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        loadDashboard();
    </script>
</body>
</html>
