<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - CloudVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-cloud-arrow-up-fill"></i> CloudVault
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">
                    <i class="bi bi-person-circle"></i> <span id="userName"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 bg-light sidebar py-4">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-house-door"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="files.html">
                            <i class="bi bi-folder"></i> My Files
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="upgrade.html">
                            <i class="bi bi-arrow-up-circle"></i> Upgrade
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="settings.html">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>

            <div class="col-md-9 col-lg-10 py-4">
                <h2 class="mb-4">Account Settings</h2>

                <div class="row">
                    <div class="col-lg-8">
                        <div class="card shadow-sm mb-4">
                            <div class="card-body">
                                <h5 class="card-title">Profile Information</h5>
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" id="profileName" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="profileEmail" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">User ID</label>
                                    <input type="text" class="form-control" id="profileUserId" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm mb-4">
                            <div class="card-body">
                                <h5 class="card-title">Subscription Details</h5>
                                <div class="mb-3">
                                    <label class="form-label">Current Plan</label>
                                    <div>
                                        <span class="badge badge-tier" id="currentPlan">Free</span>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Storage Quota</label>
                                    <div id="storageQuota">1 GB</div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Status</label>
                                    <div>
                                        <span class="badge bg-success" id="subscriptionStatus">Active</span>
                                    </div>
                                </div>
                                <a href="upgrade.html" class="btn btn-primary">Upgrade Plan</a>
                                <button class="btn btn-outline-danger" onclick="cancelSubscription()">Cancel Subscription</button>
                            </div>
                        </div>

                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title text-danger">Danger Zone</h5>
                                <p class="text-muted">Once you delete your account, there is no going back. Please be certain.</p>
                                <button class="btn btn-danger" onclick="deleteAccount()">Delete Account</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        checkAuth();
        
        function loadSettings() {
            const name = localStorage.getItem('name');
            const email = localStorage.getItem('email');
            const userId = localStorage.getItem('userId');
            
            document.getElementById('userName').textContent = name;
            document.getElementById('profileName').value = name;
            document.getElementById('profileEmail').value = email;
            document.getElementById('profileUserId').value = userId;
            
            loadSubscription();
        }
        
        async function loadSubscription() {
            try {
                const response = await fetch(`${API_URL}/subscription?action=get_status`, {
                    headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const tierName = data.tier.charAt(0).toUpperCase() + data.tier.slice(1);
                    const tierBadge = document.getElementById('currentPlan');
                    tierBadge.textContent = tierName;
                    tierBadge.className = `badge badge-tier badge-${data.tier}`;
                    
                    const quotaGB = (data.storageQuota / 1073741824).toFixed(0);
                    document.getElementById('storageQuota').textContent = `${quotaGB} GB`;
                    
                    const statusBadge = document.getElementById('subscriptionStatus');
                    statusBadge.textContent = data.status.charAt(0).toUpperCase() + data.status.slice(1);
                    statusBadge.className = `badge bg-${data.status === 'active' ? 'success' : 'secondary'}`;
                }
            } catch (error) {
                console.error('Error loading subscription:', error);
            }
        }
        
        async function cancelSubscription() {
            if (!confirm('Are you sure you want to cancel your subscription? You will be downgraded to the free plan.')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/subscription`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({action: 'cancel'})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Subscription cancelled successfully', 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showAlert(data.error || 'Cancellation failed', 'danger');
                }
            } catch (error) {
                showAlert('Network error', 'danger');
            }
        }
        
        function deleteAccount() {
            if (!confirm('Are you sure you want to delete your account? This action cannot be undone and all your files will be permanently deleted.')) {
                return;
            }
            
            if (!confirm('This is your final warning. Type DELETE to confirm.')) {
                return;
            }
            
            showAlert('Account deletion feature coming soon. Please contact support.', 'info');
        }
        
        function showAlert(message, type) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show alert-floating" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            document.getElementById('alertContainer').innerHTML = alertHtml;
            setTimeout(() => {
                const alert = document.querySelector('.alert');
                if (alert) alert.remove();
            }, 5000);
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        loadSettings();
    </script>
</body>
</html>
