<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Campaign</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { padding-top: 80px; }
        #editor { height: 400px; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <h1>📝 Create Email Campaign</h1>
        
        <div class="card">
            <div class="card-body">
                <div class="mb-3">
                    <label>Campaign Title</label>
                    <input type="text" class="form-control" id="title" placeholder="Weekly Newsletter">
                </div>

                <div class="mb-3">
                    <label>Email Subject</label>
                    <input type="text" class="form-control" id="subject" placeholder="This Week's Updates">
                </div>

                <div class="mb-3">
                    <label>Send To</label>
                    <select class="form-control" id="recipient-filter">
                        <option value="all">All Active Subscribers</option>
                        <option value="tags">Subscribers with Specific Tags</option>
                    </select>
                </div>

                <div class="mb-3" id="tags-section" style="display: none;">
                    <label>Select Tags (comma-separated)</label>
                    <input type="text" class="form-control" id="filter-tags" placeholder="e.g., newsletter, events, prayer">
                    <small class="text-muted">Only subscribers with these tags will receive the email</small>
                </div>

                <div class="mb-3">
                    <label>Email Content</label>
                    <div id="editor"></div>
                </div>

                <div class="mb-3">
                    <small class="text-muted">
                        Mail merge tags: {{first_name}}, {{last_name}}, {{email}}, {{unsubscribe_link}}
                    </small>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary" onclick="saveDraft()">💾 Save Draft</button>
                    <button class="btn btn-success" onclick="sendCampaign()">📧 Send Now</button>
                    <a href="user-email-dashboard.html" class="btn btn-secondary">Cancel</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="navbar.js"></script>
    <script>
        const API_URL = 'https://olmcyxwc1a.execute-api.us-east-1.amazonaws.com/prod/user-email';
        const token = localStorage.getItem('auth_token');
        
        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    ['link', 'image'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'header': [1, 2, 3, false] }]
                ]
            }
        });

        let campaignId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const editCampaignId = urlParams.get('id');
        const viewOnly = urlParams.get('view') === 'true';

        document.getElementById('recipient-filter').addEventListener('change', function() {
            document.getElementById('tags-section').style.display = 
                this.value === 'tags' ? 'block' : 'none';
        });

        if (editCampaignId) {
            loadCampaign(editCampaignId);
        }

        async function loadCampaign(id) {
            const response = await fetch(`${API_URL}?action=get_campaign&campaign_id=${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            
            if (data.campaign) {
                campaignId = id;
                document.getElementById('title').value = data.campaign.title;
                document.getElementById('subject').value = data.campaign.subject;
                quill.root.innerHTML = data.campaign.content;
                
                if (viewOnly) {
                    document.getElementById('title').disabled = true;
                    document.getElementById('subject').disabled = true;
                    quill.enable(false);
                    document.querySelector('.d-flex.gap-2').innerHTML = '<a href="user-email-dashboard.html" class="btn btn-secondary">Back to Dashboard</a>';
                }
            }
        }

        async function saveDraft() {
            const data = {
                title: document.getElementById('title').value,
                subject: document.getElementById('subject').value,
                content: quill.root.innerHTML,
                filter_tags: document.getElementById('recipient-filter').value === 'tags' 
                    ? document.getElementById('filter-tags').value.split(',').map(t => t.trim())
                    : []
            };

            const action = campaignId ? 'update_campaign' : 'create_campaign';
            if (campaignId) data.campaign_id = campaignId;

            const response = await fetch(`${API_URL}?action=${action}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            if (response.ok) {
                campaignId = result.campaign_id;
                alert('Draft saved!');
            } else {
                alert(result.error || 'Failed to save');
            }
        }

        async function sendCampaign() {
            if (!campaignId) {
                await saveDraft();
            }

            if (!confirm('Send this campaign to all active subscribers?')) return;

            const response = await fetch(`${API_URL}?action=send_campaign`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ campaign_id: campaignId })
            });

            const result = await response.json();
            
            if (response.ok) {
                alert(`Campaign queued! Sending to ${result.recipient_count} subscribers.`);
                window.location.href = 'user-email-dashboard.html';
            } else {
                alert(result.error || 'Failed to send');
            }
        }
    </script>
</body>
</html>
